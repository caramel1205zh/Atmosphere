name: Build Atmosphère

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Atmosphère
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: master
          submodules: recursive

      - name: Set environment variables
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITA64=/opt/devkitpro/devkitA64" >> $GITHUB_ENV
        shell: bash

      - name: Update system and install dependencies
        run: |
          sudo apt-get update -y && sudo apt-get upgrade -y git build-essential
          sudo apt-get install -y zip
        shell: bash

      - name: Install libnx
        run: |
          cd ..
          git clone --recurse-submodules https://github.com/switchbrew/libnx.git
          cd libnx
          git config --global --add safe.directory "*"
          make install -j$(nproc)
        shell: bash

      - name: Build Atmosphère
        run: |
          git config --global --add safe.directory "*" && make -f atmosphere.mk dist-no-debug
        shell: bash

      - name: Upload Atmosphère
        uses: actions/upload-artifact@v7
        with:
          name: Atmosphère
          path: ./out/nintendo_nx_arm64_armv8a/
